databases:
  - name: fitstore-db
    databaseName: fitstore
    user: fitstore
    plan: free

services:
  # ── BACKEND (Django) ─────────────────────────────────────────
  - type: web
    name: fitstore-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python load_sample_data.py
    startCommand: gunicorn fitstore.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitstore-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.render.com"
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://fitstore-frontend.onrender.com"
      - key: FRONTEND_URL
        value: "https://fitstore-frontend.onrender.com"
      - key: RESEND_API_KEY
        value: ""

  # ── FRONTEND (React/Vite static site) ───────────────────────
  - type: web
    name: fitstore-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: "https://fitstore-backend.onrender.com/api"
